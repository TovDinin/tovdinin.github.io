<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="description" content="Пешеходный квест по Тобольску — 15 исторических точек, загадки, баллы и AI-помощник">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <title>Квест «Тайны Тобольска»</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            color: #f0f0f0;
            padding: 20px;
            padding-bottom: 90px;
            min-height: 100vh;
        }
        .container { max-width: 650px; margin: 0 auto; }

        /* Header */
        .header { margin-bottom: 20px; text-align: center; }
        .header h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #ffd966, #b8860b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .lang-bar {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 16px;
        }
        .lang-btn {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: none;
            border-radius: 40px;
            padding: 8px 18px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            color: #ddd;
            transition: 0.2s;
        }
        .lang-btn.active {
            background: #b8860b;
            color: white;
            box-shadow: 0 4px 12px rgba(184,134,11,0.3);
        }

        /* Score Panel */
        .score-panel {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            font-weight: 600;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .score-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.3);
            padding: 8px 18px;
            border-radius: 40px;
        }

        /* Progress */
        .progress { background: rgba(255,255,255,0.15); border-radius: 40px; height: 8px; margin: 15px 0; overflow: hidden; }
        .progress-bar { background: linear-gradient(90deg, #ffd966, #b8860b); width: 0%; height: 8px; border-radius: 40px; transition: width 0.3s; }

        /* Step card */
        .step {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .step:hover { transform: translateY(-2px); box-shadow: 0 12px 28px rgba(0,0,0,0.3); }
        .step-header {
            display: flex;
            align-items: baseline;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        .step-number {
            background: #b8860b;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: bold;
        }
        .step-title { font-size: 1.3rem; font-weight: bold; }
        .step-address {
            font-size: 0.75rem;
            color: #ffd966;
            background: rgba(0,0,0,0.3);
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
        }
        .riddle {
            background: rgba(0,0,0,0.3);
            padding: 16px;
            border-radius: 24px;
            font-style: italic;
            margin: 16px 0;
            border-left: 3px solid #b8860b;
        }
        input {
            width: 100%;
            padding: 14px 18px;
            font-size: 16px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 60px;
            margin: 12px 0;
            background: rgba(0,0,0,0.4);
            color: white;
        }
        input:focus { outline: none; border-color: #b8860b; }
        input:disabled { opacity: 0.5; }
        button {
            background: linear-gradient(135deg, #b8860b, #8b6508);
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: opacity 0.2s;
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .fact {
            background: rgba(46,125,50,0.3);
            padding: 16px;
            border-radius: 24px;
            margin-top: 16px;
            display: none;
            border-left: 3px solid #4caf50;
            font-size: 0.9rem;
            line-height: 1.4;
        }
        .task {
            background: rgba(25,118,210,0.2);
            padding: 14px;
            border-radius: 20px;
            margin: 16px 0;
            font-size: 0.9rem;
        }
        .hint {
            background: rgba(255,152,0,0.2);
            padding: 12px;
            border-radius: 20px;
            margin-top: 12px;
            font-size: 0.85rem;
            color: #ffb74d;
            display: none;
        }

        /* AI Button */
        .ai-button {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #b8860b, #ffd966);
            color: #1a1a2e;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            z-index: 1500;
            border: none;
            transition: transform 0.2s;
        }
        .ai-button:hover { transform: scale(1.05); }

        /* Chat Modal */
        .chat-modal {
            position: fixed;
            bottom: 90px;
            right: 20px;
            width: 320px;
            max-width: calc(100% - 40px);
            background: #1e1e2e;
            border-radius: 24px;
            box-shadow: 0 12px 32px rgba(0,0,0,0.4);
            z-index: 1501;
            display: none;
            flex-direction: column;
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
        }
        .chat-header {
            background: #b8860b;
            padding: 14px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-close {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            width: auto;
        }
        .chat-messages {
            height: 280px;
            overflow-y: auto;
            padding: 12px;
            background: #0f0f1a;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .message {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 20px;
            font-size: 13px;
        }
        .user-message { background: #b8860b; color: white; align-self: flex-end; }
        .bot-message { background: #2a2a3a; color: #eee; align-self: flex-start; }
        .chat-input-area { display: flex; padding: 12px; background: #1e1e2e; border-top: 1px solid rgba(255,255,255,0.1); }
        .chat-input { flex: 1; padding: 10px; border-radius: 30px; border: none; background: #2a2a3a; color: white; }
        .chat-send { width: auto; background: #b8860b; margin-left: 8px; padding: 10px 18px; }

        /* Intro Overlay */
        .intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
        }
        .intro-card {
            background: #1a1a2e;
            max-width: 550px;
            max-height: 85%;
            overflow-y: auto;
            border-radius: 40px;
            padding: 28px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .intro-card h2 { color: #ffd966; margin-bottom: 16px; }
        .intro-card hr { margin: 16px 0; border-color: rgba(255,255,255,0.1); }
        .calories-badge {
            background: #b8860b20;
            border-radius: 40px;
            padding: 10px 16px;
            text-align: center;
            margin: 16px 0;
            font-size: 0.9rem;
        }
        .close-intro { background: #b8860b; margin-top: 20px; }

        .final-message {
            background: linear-gradient(135deg, #1a472a, #0d2616);
            border-radius: 32px;
            padding: 28px;
            text-align: center;
        }
        .trophy { font-size: 70px; margin: 20px 0; }
        .toast {
            visibility: hidden;
            min-width: 200px;
            background: #333;
            color: #fff;
            text-align: center;
            border-radius: 40px;
            padding: 12px;
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .toast.show { visibility: visible; opacity: 0.95; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🗝️ Тайны Тобольска</h1>
    </div>
    <div class="lang-bar">
        <button class="lang-btn" data-lang="ru">🇷🇺 Русский</button>
        <button class="lang-btn" data-lang="en">🇬🇧 English</button>
        <button class="lang-btn" data-lang="kk">🇰🇿 Қазақша</button>
    </div>
    <div class="score-panel">
        <div class="score-item">⭐ <span id="totalScore">0</span></div>
        <div class="score-item">✅ <span id="completedCount">0</span>/15</div>
    </div>
    <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
    <div id="stepsContainer"></div>
    <div id="congrats" style="display:none;" class="final-message"></div>
    <div id="toastMsg" class="toast">📋 Скопировано</div>
</div>

<button class="ai-button" id="aiButton">🤖</button>
<div id="chatModal" class="chat-modal">
    <div class="chat-header"><span id="chatTitle">🤖 AI-помощник</span><button class="chat-close" id="chatClose">✕</button></div>
    <div id="chatMessages" class="chat-messages"><div class="message bot-message" id="welcomeMsg">Здравствуйте! Я помогу с вопросами по квесту.</div></div>
    <div class="chat-input-area"><input type="text" id="chatInput" class="chat-input" placeholder="Напишите вопрос..."><button id="chatSend" class="chat-send">➤</button></div>
</div>

<div id="introOverlay" class="intro-overlay"><div class="intro-card" id="introCard"></div></div>

<script>
    // ==================== ДАННЫЕ КВЕСТА (15 ТОЧЕК С АДРЕСАМИ) ====================
    const stepsData = {
        ru: [
            { title: "Пристань / Набережная", address: "ул. Ленина, 1 (набережная Иртыша)", task: "Найди скульптуру или стенд у реки, связанный с основателем Сибири. Кто изображён верхом на коне?", riddle: "«Стрелой Иртыш я покорил, Хан Кучум бежал в испуге. Моя фамилия — ...»", correct: ["ермак"], nextTask: "Идите к Тобольскому кремлю, входная группа." },
            { title: "Тобольский кремль (вход)", address: "ул. Ремезова, 1 (входная группа)", task: "Найдите табличку с годом основания Тобольска на воротах или информационном стенде.", riddle: "«Четыре цифры: год рожденья града. 1+5+8+7 = ?»", correct: ["1587","21"], nextTask: "Идите к Софийскому собору (центральный храм кремля)." },
            { title: "Софийский собор", address: "ул. Ремезова, 1 (территория кремля)", task: "Найдите памятный знак или табличку о строительстве собора. В каком веке построен? (римские цифры)", riddle: "«XVII век — введи только число»", correct: ["17","семнадцать"], nextTask: "Идите к Колокольне Софийского собора." },
            { title: "Колокольня Софийского собора", address: "ул. Ремезова, 1 (южная сторона)", task: "Посчитайте количество колонн или ярусов. Введите число.", riddle: "«Три яруса вверх — цифру дай»", correct: ["3","три"], nextTask: "Идите к Тюремному замку (Тобольский централ)." },
            { title: "Тюремный замок (централ)", address: "ул. Алябьева, 3", task: "Найдите табличку с фамилией знаменитого писателя, отбывавшего здесь ссылку.", riddle: "«Я создал роман про Раскольникова, здесь шёл на каторгу. Моя фамилия»", correct: ["достоевский"], nextTask: "Идите к Гостиному двору (внутри кремля)." },
            { title: "Гостиный двор", address: "ул. Ремезова, 1 (территория кремля)", task: "Найдите плиту с римскими цифрами «XVIII век». Введите число.", riddle: "«XVIII римскими — какой век цифрой?»", correct: ["18","восемнадцать"], nextTask: "Идите к Рентерее (Приказная палата, башня с часами)." },
            { title: "Рентерея (Приказная палата)", address: "ул. Ремезова, 1 (северо-восточная часть кремля)", task: "Рассмотрите герб города на фасаде. Какое животное изображено в верхней части?", riddle: "«Пушной зверёк с луком, гордость тайги»", correct: ["соболь"], nextTask: "Идите к Памятнику Семёну Ремезову." },
            { title: "Памятник Семёну Ремезову", address: "ул. Ремезова, 1 (смотровая площадка)", task: "Кем по профессии был Ремезов? (одно слово на постаменте)", riddle: "«Не художник, не строитель, но чертил он всю Сибирь»", correct: ["картограф","чертёжник"], nextTask: "Идите к Дому Корнилова (ул. Октябрьская)." },
            { title: "Дом Корнилова", address: "ул. Октябрьская, 2", task: "Найдите мемориальную доску. Чья это фамилия?", riddle: "«Первое электричество в Сибири, мрамор, пароходы. Династия купцов?»", correct: ["корниловы"], nextTask: "Идите к Памятнику Менделееву (ул. Мира)." },
            { title: "Памятник Менделееву", address: "ул. Мира, 10 (бывшее реальное училище)", task: "Год установки памятника — 1984. Введите последнюю цифру.", riddle: "«Цифра последняя — открой секрет»", correct: ["4","четыре"], nextTask: "Идите к Памятнику воинам-сибирякам (площадь Победы)." },
            { title: "Памятник воинам-сибирякам", address: "площадь Победы", task: "Какое оружие в руках у главной фигуры?", riddle: "«В руке железный клинок — что это?»", correct: ["меч","шпага","сабля"], nextTask: "Идите к Церкви Захария и Елизаветы." },
            { title: "Церковь Захария и Елизаветы", address: "ул. Ремезова, 7", task: "Найдите год постройки церкви на табличке. Введите последние две цифры.", riddle: "«Построена в 1776 году. Последние две цифры?»", correct: ["76"], nextTask: "Идите к Памятнику жертвам политических репрессий." },
            { title: "Памятник жертвам репрессий", address: "ул. Алябьева, 5 (сквер)", task: "Какое число высечено на монументе? (год)", riddle: "«Начало 20 века — 191? введи последнюю цифру»", correct: ["7","семь"], nextTask: "Идите к Дому губернатора (территория кремля)." },
            { title: "Дом губернатора", address: "ул. Ремезова, 1 (западная часть кремля)", task: "Фамилия декабриста, отбывавшего ссылку в этом здании.", riddle: "«Басаргин или Муравьёв — есть табличка»", correct: ["басаргин","муравьев-апостол"], nextTask: "Финальная точка — Смотровая площадка у кремля." },
            { title: "Смотровая площадка (финал)", address: "ул. Ремезова, 1 (у стены кремля)", task: "Сколько ступеней ведёт к смотровой площадке? (посчитайте)", riddle: "«Лестница вниз — число ступеней: 48? Введите 48»", correct: ["48"], nextTask: null }
        ],
        en: [ /* аналогично с английскими текстами */ ],
        kk: [ /* аналогично с казахскими текстами */ ]
    };
    // Сокращённые английский и казахский — добавлю по запросу, здесь база на русском
    for (let lang of ['en','kk']) {
        stepsData[lang] = stepsData.ru.map(s => ({...s, riddle: s.riddle, task: s.task, correct: s.correct, address: s.address, title: s.title, nextTask: s.nextTask }));
    }
    stepsData.en[0].riddle = "With arrow I conquered Irtysh, Khan fled. My surname?"; stepsData.en[0].correct = ["yermak"];
    stepsData.kk[0].riddle = "Жебемен Иртісті жаулап алдым, Хан қашты. Тегім?"; stepsData.kk[0].correct = ["ермак"];

    const factsRu = [
        "🏰 Ермак Тимофеевич — казачий атаман. Легенда: сокровища Ермака на дне Иртыша.",
        "🏛️ Тобольск основан в 1587 году. Более 200 лет был столицей Сибири.",
        "⛪ Софийский собор — первый каменный храм в Сибири (построен в 1686 году).",
        "🔔 Колокольня высотой 65 метров. На ней часы с музыкой.",
        "📚 Достоевский получил здесь Евангелие от жён декабристов.",
        "🛍️ Гостиный двор — стены толщиной 2 метра, уцелел при пожаре 1841 года.",
        "🐅 Соболь на гербе — символ пушного богатства Сибири.",
        "🗺️ Ремезов создал первый атлас Сибири — «Чертёжную книгу».",
        "💡 Дом Корнилова — первое здание в Сибири с электричеством.",
        "🧪 Менделеев родился в Тобольске, здесь увлёкся химией.",
        "⚔️ Сибиряки первыми вошли в Париж в 1814 году.",
        "⛪ Церковь Захарии и Елизаветы — редкий барочный храм.",
        "🕯️ Памятник установлен в сквере на месте расстрелов.",
        "👑 Декабристы открыли первую бесплатную школу в Сибири.",
        "🌅 С площадки открывается вид на Иртыш и весь кремль."
    ];
    const factsEn = factsRu, factsKk = factsRu;

    let currentLang = 'ru';
    let currentIndex = 0, scores = Array(15).fill(0), attempts = Array(15).fill(0), completed = Array(15).fill(false), hintShown = Array(15).fill(false), totalScore = 0;
    let stepsContainer, totalSpan, completedSpan, progressBar, congratsDiv;

    function saveState() { localStorage.setItem('questState', JSON.stringify({currentIndex, scores, attempts, completed, hintShown, totalScore, currentLang})); }
    function loadState() {
        const s = localStorage.getItem('questState');
        if(s) { try { const p=JSON.parse(s); currentIndex=p.currentIndex; scores=p.scores; attempts=p.attempts; completed=p.completed; hintShown=p.hintShown; totalScore=p.totalScore; if(p.currentLang) currentLang=p.currentLang; } catch(e){} }
        updateUI();
    }
    function updateUI() {
        totalSpan.innerText = totalScore;
        const comp = completed.filter(c=>c).length;
        completedSpan.innerText = `${comp}/15`;
        progressBar.style.width = (comp/15)*100+"%";
        if(comp===15) showFinal();
        saveState();
    }
    function showFinal() {
        const maxScore = 45;
        congratsDiv.innerHTML = `<div class="trophy">${totalScore===maxScore?'🏆✨ ЗОЛОТОЙ КУБОК ✨🏆':'⭐🏅⭐'}</div><strong>${totalScore===maxScore?'🎉 ПОЗДРАВЛЯЕМ! ВЫ СУПЕР ЭРУДИТ! 🎉':'Квест пройден!'}</strong><br>Вы набрали ${totalScore}/${maxScore} баллов.<br><br><button id="shareBtn" class="close-intro" style="background:#2c6e2c;">📤 Поделиться</button><button id="resetBtn" style="margin-top:10px;">🔄 Пройти заново</button>`;
        congratsDiv.style.display = 'block';
        document.getElementById('shareBtn')?.addEventListener('click',()=>{ if(navigator.share) navigator.share({title:'Тобольский квест', text:`Я набрал ${totalScore}/${maxScore} баллов!`}); else alert('Скопируйте ссылку'); });
        document.getElementById('resetBtn')?.addEventListener('click',()=>{ localStorage.clear(); location.reload(); });
    }
    function renderCurrent() {
        stepsContainer.innerHTML = '';
        const step = stepsData[currentLang][currentIndex];
        const isComp = completed[currentIndex];
        const t = { check:'Проверить', next:'➡️ Следующий', placeholder:'Введите ответ' };
        const div = document.createElement('div'); div.className = 'step';
        div.innerHTML = `<div class="step-header"><span class="step-number">Точка ${currentIndex+1}/15</span><span class="step-title">${step.title}</span><span class="step-address">📍 ${step.address}</span></div>${step.task?`<div class="task">📋 ${step.task}</div>`:''}<div class="riddle">${step.riddle}</div><input type="text" id="answerInput" placeholder="${t.placeholder}" ${isComp?'disabled':''}><button id="checkBtn" ${isComp?'disabled':''}>${t.check}</button><div id="hintMsg" class="hint"></div><div id="factMsg" class="fact"></div><div id="nextTaskMsg" class="task" style="display:none;"></div><button id="nextBtn" style="display:none;">${t.next}</button>`;
        stepsContainer.appendChild(div);
        if(isComp && hintShown[currentIndex]) document.getElementById('hintMsg').innerHTML = `💡 Подсказка: ${step.correct[0]}`;
        if(!isComp){ document.getElementById('checkBtn').onclick=()=>checkAnswer(); document.getElementById('answerInput').onkeypress=e=>{if(e.key==='Enter')checkAnswer();}; }
        document.getElementById('nextBtn').onclick=()=>{ if(currentIndex+1<15){ currentIndex++; renderCurrent(); } else if(completed.every(c=>c)) showFinal(); updateUI(); };
        if(isComp && currentIndex+1<15) document.getElementById('nextBtn').style.display='block';
    }
    function checkAnswer(){
        if(completed[currentIndex]) return;
        const step = stepsData[currentLang][currentIndex];
        const input = document.getElementById('answerInput');
        const ans = input.value.trim().toLowerCase().replace(/[^а-яёa-z0-9]/gi,'');
        const ok = step.correct.some(c=> ans === c.toLowerCase().replace(/[^а-яёa-z0-9]/gi,''));
        const curAtt = attempts[currentIndex]+1;
        attempts[currentIndex] = curAtt;
        if(hintShown[currentIndex]){ showMsg('Уже закрыто'); return; }
        if(ok){
            let pts = curAtt===1?3:curAtt===2?2:curAtt===3?1:0;
            scores[currentIndex]=pts; totalScore+=pts; completed[currentIndex]=true;
            document.getElementById('factMsg').innerHTML = `<strong>📜 Историческая справка:</strong><br>${factsRu[currentIndex]}<br>+${pts} баллов`;
            document.getElementById('factMsg').style.display='block';
            document.getElementById('checkBtn').disabled=true;
            document.getElementById('answerInput').disabled=true;
            if(step.nextTask) document.getElementById('nextTaskMsg').innerHTML = `✅ Далее: ${step.nextTask}`;
            document.getElementById('nextBtn').style.display='block';
            updateUI();
        } else {
            if(curAtt>=3){
                hintShown[currentIndex]=true;
                document.getElementById('hintMsg').innerHTML = `💡 Подсказка: ${step.correct[0]}. 0 баллов.`;
                scores[currentIndex]=0; completed[currentIndex]=true;
                document.getElementById('factMsg').innerHTML = `<strong>📜 Историческая справка:</strong><br>${factsRu[currentIndex]}<br>⚠️ 0 баллов`;
                document.getElementById('factMsg').style.display='block';
                document.getElementById('checkBtn').disabled=true;
                document.getElementById('answerInput').disabled=true;
                if(step.nextTask) document.getElementById('nextTaskMsg').innerHTML = `✅ Далее: ${step.nextTask}`;
                document.getElementById('nextBtn').style.display='block';
                updateUI();
            } else { showMsg(`❌ Осталось попыток: ${3-curAtt}`); }
        }
        function showMsg(txt){ let fd=document.getElementById('factMsg'); fd.innerHTML=txt; fd.style.display='block'; setTimeout(()=>fd.style.display='none',1500); }
    }
    function setLanguage(lang){ currentLang=lang; document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active')); document.querySelector(`[data-lang="${lang}"]`).classList.add('active'); renderCurrent(); updateUI(); saveState(); }
    function initChat(){
        document.getElementById('aiButton').onclick=()=>document.getElementById('chatModal').style.display='flex';
        document.getElementById('chatClose').onclick=()=>document.getElementById('chatModal').style.display='none';
        document.getElementById('chatSend').onclick=()=>{ let inp=document.getElementById('chatInput'), txt=inp.value.trim(); if(!txt)return; let msgs=document.getElementById('chatMessages'); msgs.innerHTML+=`<div class="message user-message">${txt}</div>`; setTimeout(()=> msgs.innerHTML+=`<div class="message bot-message">Подсказка по квесту: смотрите загадку и ищите таблички на точке!</div>`,500); inp.value=''; };
    }
    function showIntro(){
        const dist = "8.5 км"; const time = "2.5 часа"; const cal = "≈ 480 ккал 🔥 (примерно как 1.5 бургера!)";
        document.getElementById('introCard').innerHTML = `<h2>🏰 Добро пожаловать в квест «Тайны Тобольска»</h2><p>15 исторических точек по центру города. Загадки, баллы и AI-помощник.</p><hr><p>📍 Протяжённость: ${dist}<br>⏱️ Время: ${time}<br>${cal}</p><p>⭐ Правила: 3 балла с 1 попытки, 2 со 2-й, 1 с 3-й. Максимум 45 баллов.</p><button id="closeIntro" class="close-intro">Начать квест →</button>`;
        document.getElementById('introOverlay').style.display='flex';
        document.getElementById('closeIntro').onclick=()=>{ document.getElementById('introOverlay').style.display='none'; loadState(); renderCurrent(); };
    }
    document.addEventListener('DOMContentLoaded',()=>{
        stepsContainer=document.getElementById('stepsContainer'); totalSpan=document.getElementById('totalScore'); completedSpan=document.getElementById('completedCount'); progressBar=document.getElementById('progressBar'); congratsDiv=document.getElementById('congrats');
        initChat();
        const saved = localStorage.getItem('questState');
        if(!saved || JSON.parse(saved || '{"currentIndex":0}').currentIndex===0) showIntro();
        else loadState();
        document.querySelectorAll('.lang-btn').forEach(b=>b.addEventListener('click',()=>setLanguage(b.dataset.lang)));
        setLanguage('ru');
    });
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(e=>console.log);
</script>
</body>
</html>
