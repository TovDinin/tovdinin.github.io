<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="description" content="Пешеходные квесты по городам России — исторические загадки, баллы и AI-помощник">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/app-icon-192.png">
    <title>QuestHub — Городские квесты</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            color: #f0f0f0;
            padding: 20px;
            padding-bottom: 90px;
            min-height: 100vh;
        }
        .container { max-width: 650px; margin: 0 auto; }

        /* Header */
        .header { margin-bottom: 24px; text-align: center; }
        .header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #ffd966, #b8860b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        .header p { color: #aaa; font-size: 0.85rem; margin-top: 4px; }

        /* City Selector */
        .city-selector {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 20px;
            margin-bottom: 24px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .city-selector h3 { margin-bottom: 16px; font-size: 1rem; color: #ffd966; }
        .city-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
        }
        .city-card {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        .city-card:hover { transform: translateY(-2px); background: rgba(184,134,11,0.2); }
        .city-card.active {
            border-color: #b8860b;
            background: linear-gradient(135deg, #b8860b20, #ffd96610);
        }
        .city-card.disabled { opacity: 0.5; cursor: not-allowed; }
        .city-card.disabled:hover { transform: none; background: rgba(0,0,0,0.3); }
        .city-icon { font-size: 48px; margin-bottom: 8px; }
        .city-name { font-weight: bold; font-size: 1rem; }
        .city-desc { font-size: 0.7rem; color: #aaa; margin-top: 4px; }
        .badge { background: #b8860b; font-size: 0.6rem; padding: 2px 8px; border-radius: 20px; display: inline-block; margin-top: 6px; }

        /* Language Bar */
        .lang-bar {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 16px;
        }
        .lang-btn {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: none;
            border-radius: 40px;
            padding: 8px 18px;
            font-weight: 600;
            cursor: pointer;
            font-size: 13px;
            color: #ddd;
            transition: 0.2s;
        }
        .lang-btn.active {
            background: #b8860b;
            color: white;
            box-shadow: 0 4px 12px rgba(184,134,11,0.3);
        }

        /* Score Panel */
        .score-panel {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .score-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.3);
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 600;
        }

        /* Progress */
        .progress { background: rgba(255,255,255,0.15); border-radius: 40px; height: 8px; margin: 15px 0; overflow: hidden; }
        .progress-bar { background: linear-gradient(90deg, #ffd966, #b8860b); width: 0%; height: 8px; border-radius: 40px; transition: width 0.3s; }

        /* Step Card */
        .step {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.2s;
        }
        .step-header {
            display: flex;
            align-items: baseline;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        .step-number {
            background: #b8860b;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .step-title { font-size: 1.2rem; font-weight: bold; }
        .step-address {
            font-size: 0.7rem;
            color: #ffd966;
            background: rgba(0,0,0,0.3);
            padding: 4px 12px;
            border-radius: 20px;
        }
        .riddle {
            background: rgba(0,0,0,0.3);
            padding: 16px;
            border-radius: 24px;
            font-style: italic;
            margin: 16px 0;
            border-left: 3px solid #b8860b;
            line-height: 1.4;
        }
        input {
            width: 100%;
            padding: 14px 18px;
            font-size: 16px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 60px;
            margin: 12px 0;
            background: rgba(0,0,0,0.4);
            color: white;
        }
        input:focus { outline: none; border-color: #b8860b; }
        input:disabled { opacity: 0.5; }
        button {
            background: linear-gradient(135deg, #b8860b, #8b6508);
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: opacity 0.2s;
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .fact {
            background: rgba(46,125,50,0.3);
            padding: 16px;
            border-radius: 24px;
            margin-top: 16px;
            display: none;
            border-left: 3px solid #4caf50;
            font-size: 0.9rem;
            line-height: 1.4;
        }
        .task {
            background: rgba(25,118,210,0.2);
            padding: 14px;
            border-radius: 20px;
            margin: 16px 0;
            font-size: 0.9rem;
        }
        .hint {
            background: rgba(255,152,0,0.2);
            padding: 12px;
            border-radius: 20px;
            margin-top: 12px;
            font-size: 0.85rem;
            color: #ffb74d;
            display: none;
        }

        /* AI Button */
        .ai-button {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #b8860b, #ffd966);
            color: #1a1a2e;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            z-index: 1500;
            border: none;
            transition: transform 0.2s;
        }
        .ai-button:hover { transform: scale(1.05); }

        /* Chat Modal */
        .chat-modal {
            position: fixed;
            bottom: 90px;
            right: 20px;
            width: 320px;
            max-width: calc(100% - 40px);
            background: #1e1e2e;
            border-radius: 24px;
            box-shadow: 0 12px 32px rgba(0,0,0,0.4);
            z-index: 1501;
            display: none;
            flex-direction: column;
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
        }
        .chat-header {
            background: #b8860b;
            padding: 14px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-close {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            width: auto;
        }
        .chat-messages {
            height: 280px;
            overflow-y: auto;
            padding: 12px;
            background: #0f0f1a;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .message {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 20px;
            font-size: 13px;
        }
        .user-message { background: #b8860b; color: white; align-self: flex-end; }
        .bot-message { background: #2a2a3a; color: #eee; align-self: flex-start; }
        .chat-input-area { display: flex; padding: 12px; background: #1e1e2e; border-top: 1px solid rgba(255,255,255,0.1); }
        .chat-input { flex: 1; padding: 10px; border-radius: 30px; border: none; background: #2a2a3a; color: white; }
        .chat-send { width: auto; background: #b8860b; margin-left: 8px; padding: 10px 18px; }

        /* Intro Overlay */
        .intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
        }
        .intro-card {
            background: #1a1a2e;
            max-width: 550px;
            max-height: 85%;
            overflow-y: auto;
            border-radius: 40px;
            padding: 28px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .intro-card h2 { color: #ffd966; margin-bottom: 16px; }
        .intro-card hr { margin: 16px 0; border-color: rgba(255,255,255,0.1); }
        .calories-badge {
            background: rgba(184,134,11,0.2);
            border-radius: 40px;
            padding: 10px 16px;
            text-align: center;
            margin: 16px 0;
        }
        .close-intro { background: #b8860b; margin-top: 20px; }

        .final-message {
            background: linear-gradient(135deg, #1a472a, #0d2616);
            border-radius: 32px;
            padding: 28px;
            text-align: center;
        }
        .trophy { font-size: 70px; margin: 20px 0; }
        .toast {
            visibility: hidden;
            min-width: 200px;
            background: #333;
            color: #fff;
            text-align: center;
            border-radius: 40px;
            padding: 12px;
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .toast.show { visibility: visible; opacity: 0.95; }

        .loading {
            text-align: center;
            padding: 40px;
            color: #aaa;
        }
        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #b8860b;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🗺️ QuestHub</h1>
        <p>Городские квесты с загадками и AI-помощником</p>
    </div>

    <!-- Селектор города -->
    <div id="citySelector" class="city-selector">
        <h3>🌆 Выберите город</h3>
        <div id="cityGrid" class="city-grid"></div>
    </div>

    <!-- Панель языков -->
    <div class="lang-bar">
        <button class="lang-btn" data-lang="ru">🇷🇺 Русский</button>
        <button class="lang-btn" data-lang="en">🇬🇧 English</button>
        <button class="lang-btn" data-lang="kk">🇰🇿 Қазақша</button>
    </div>

    <!-- Панель баллов -->
    <div class="score-panel">
        <div class="score-item">⭐ <span id="totalScore">0</span></div>
        <div class="score-item">✅ <span id="completedCount">0</span>/<span id="totalPoints">0</span></div>
    </div>
    <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
    <div id="stepsContainer"></div>
    <div id="congrats" style="display:none;" class="final-message"></div>
    <div id="toastMsg" class="toast">📋 Скопировано</div>
</div>

<button class="ai-button" id="aiButton">🤖</button>
<div id="chatModal" class="chat-modal">
    <div class="chat-header"><span id="chatTitle">🤖 AI-помощник</span><button class="chat-close" id="chatClose">✕</button></div>
    <div id="chatMessages" class="chat-messages"><div class="message bot-message" id="welcomeMsg">Здравствуйте! Я помогу с вопросами по квесту.</div></div>
    <div class="chat-input-area"><input type="text" id="chatInput" class="chat-input" placeholder="Напишите вопрос..."><button id="chatSend" class="chat-send">➤</button></div>
</div>

<div id="introOverlay" class="intro-overlay"><div class="intro-card" id="introCard"></div></div>

<script>
    // ==================== ГЛОБАЛЬНОЕ СОСТОЯНИЕ ====================
    let currentCity = null;
    let currentLang = 'ru';
    let currentIndex = 0;
    let scores = [];
    let attempts = [];
    let completed = [];
    let hintShown = [];
    let totalScore = 0;
    let totalPoints = 0;
    
    let citiesList = [];
    let currentCityData = null;
    let currentSteps = null;
    let currentFacts = null;
    
    let isLoading = false;
    
    // DOM элементы
    let stepsContainer, totalSpan, completedSpan, totalPointsSpan, progressBar, congratsDiv, cityGrid;

    // ==================== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ====================
    function saveState() {
        if (!currentCity) return;
        const state = {
            currentIndex, scores, attempts, completed, hintShown, totalScore, currentLang,
            currentCity, totalPoints
        };
        localStorage.setItem('quest_state', JSON.stringify(state));
        // Сохраняем отдельно прогресс города
        const cityProgress = { scores, attempts, completed, hintShown, totalScore, currentIndex };
        localStorage.setItem(`city_${currentCity}_progress`, JSON.stringify(cityProgress));
    }

    function loadSavedState() {
        const saved = localStorage.getItem('quest_state');
        if (saved) {
            try {
                const s = JSON.parse(saved);
                if (s.currentCity) {
                    currentCity = s.currentCity;
                    currentLang = s.currentLang || 'ru';
                    currentIndex = s.currentIndex || 0;
                    scores = s.scores || [];
                    attempts = s.attempts || [];
                    completed = s.completed || [];
                    hintShown = s.hintShown || [];
                    totalScore = s.totalScore || 0;
                    totalPoints = s.totalPoints || 0;
                    return true;
                }
            } catch(e) {}
        }
        return false;
    }

    function loadCityProgress(cityId) {
        const saved = localStorage.getItem(`city_${cityId}_progress`);
        if (saved) {
            try {
                const p = JSON.parse(saved);
                scores = p.scores || [];
                attempts = p.attempts || [];
                completed = p.completed || [];
                hintShown = p.hintShown || [];
                totalScore = p.totalScore || 0;
                currentIndex = p.currentIndex || 0;
                return true;
            } catch(e) {}
        }
        return false;
    }

    function resetStateForCity(cityData) {
        const stepsCount = cityData.steps.ru.length;
        scores = Array(stepsCount).fill(0);
        attempts = Array(stepsCount).fill(0);
        completed = Array(stepsCount).fill(false);
        hintShown = Array(stepsCount).fill(false);
        totalScore = 0;
        currentIndex = 0;
        totalPoints = stepsCount * 3;
    }

    function updateUI() {
        if (!currentCityData) return;
        totalSpan.innerText = totalScore;
        const compCount = completed.filter(c => c === true).length;
        completedSpan.innerText = `${compCount}/${currentSteps.length}`;
        totalPointsSpan.innerText = currentSteps.length * 3;
        const percent = (compCount / currentSteps.length) * 100;
        progressBar.style.width = percent + "%";
        if (compCount === currentSteps.length && currentSteps.length > 0) showFinalScreen();
        saveState();
    }

    function showFinalScreen() {
        const maxScore = currentSteps.length * 3;
        congratsDiv.innerHTML = `
            <div class="trophy">${totalScore === maxScore ? '🏆✨ ЗОЛОТОЙ КУБОК ✨🏆' : '⭐🏅⭐'}</div>
            <strong>${totalScore === maxScore ? '🎉 ПОЗДРАВЛЯЕМ! ВЫ СУПЕР ЭРУДИТ! 🎉' : 'Квест пройден!'}</strong>
            <br>Вы набрали ${totalScore}/${maxScore} баллов.
            <br><br>
            <button id="shareBtn" class="close-intro" style="background:#2c6e2c;">📤 Поделиться</button>
            <button id="resetBtn" style="margin-top:10px;">🔄 Пройти заново</button>
        `;
        congratsDiv.style.display = 'block';
        document.getElementById('shareBtn')?.addEventListener('click', () => {
            if (navigator.share) {
                navigator.share({ title: currentCityData.name.ru, text: `Я прошёл квест и набрал ${totalScore}/${maxScore} баллов!` });
            } else {
                const toast = document.getElementById('toastMsg');
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2000);
            }
        });
        document.getElementById('resetBtn')?.addEventListener('click', () => {
            resetStateForCity(currentCityData);
            renderCurrentQuestion();
            updateUI();
        });
    }

    function showMessage(text, isError = false) {
        const toast = document.getElementById('toastMsg');
        toast.innerText = text;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
    }

    // ==================== ОСНОВНЫЕ ФУНКЦИИ КВЕСТА ====================
    function renderCurrentQuestion() {
        if (!currentSteps || currentSteps.length === 0) return;
        stepsContainer.innerHTML = '';
        const step = currentSteps[currentIndex];
        const isCompleted = completed[currentIndex];
        
        const div = document.createElement('div');
        div.className = 'step';
        div.innerHTML = `
            <div class="step-header">
                <span class="step-number">Точка ${currentIndex+1}/${currentSteps.length}</span>
                <span class="step-title">${step.title}</span>
                <span class="step-address">📍 ${step.address || 'Адрес уточняется'}</span>
            </div>
            ${step.task ? `<div class="task">📋 ${step.task}</div>` : ''}
            <div class="riddle">${step.riddle}</div>
            <input type="text" id="answerInput" placeholder="Введите ответ" ${isCompleted ? 'disabled' : ''} autocomplete="off">
            <button id="checkBtn" ${isCompleted ? 'disabled' : ''}>Проверить</button>
            <div id="hintMsg" class="hint"></div>
            <div id="factMsg" class="fact"></div>
            <div id="nextTaskMsg" class="task" style="display:none;"></div>
            <button id="nextBtn" style="display:none;">➡️ Следующий вопрос</button>
        `;
        stepsContainer.appendChild(div);
        
        if (isCompleted && hintShown[currentIndex]) {
            const hintDiv = document.getElementById('hintMsg');
            if (hintDiv) hintDiv.innerHTML = `💡 Подсказка: ${step.correct[0]}`;
        }
        
        if (!isCompleted) {
            const checkBtn = document.getElementById('checkBtn');
            const answerInput = document.getElementById('answerInput');
            if (checkBtn) checkBtn.onclick = () => checkAnswer();
            if (answerInput) answerInput.onkeypress = (e) => { if (e.key === 'Enter') checkAnswer(); };
        }
        
        const nextBtn = document.getElementById('nextBtn');
        if (nextBtn) nextBtn.onclick = () => {
            if (currentIndex + 1 < currentSteps.length) {
                currentIndex++;
                renderCurrentQuestion();
                updateUI();
            } else if (completed.every(c => c === true)) {
                showFinalScreen();
            }
        };
        
        if (isCompleted && currentIndex + 1 < currentSteps.length) {
            if (nextBtn) nextBtn.style.display = 'block';
            const nextTaskDiv = document.getElementById('nextTaskMsg');
            if (nextTaskDiv && step.nextTask) {
                nextTaskDiv.innerHTML = `✅ Далее: ${step.nextTask}`;
                nextTaskDiv.style.display = 'block';
            }
        } else if (isCompleted && currentIndex + 1 === currentSteps.length) {
            showFinalScreen();
        }
    }

    function checkAnswer() {
        if (completed[currentIndex]) return;
        
        const step = currentSteps[currentIndex];
        const input = document.getElementById('answerInput');
        const userAnswer = input.value.trim().toLowerCase().replace(/[^а-яёa-z0-9]/gi, '');
        const isCorrect = step.correct.some(c => userAnswer === c.toLowerCase().replace(/[^а-яёa-z0-9]/gi, ''));
        
        const curAttempt = (attempts[currentIndex] || 0) + 1;
        attempts[currentIndex] = curAttempt;
        
        if (hintShown[currentIndex]) {
            showMessage('Этот вопрос уже закрыт с 0 баллов', true);
            return;
        }
        
        if (isCorrect) {
            let points = curAttempt === 1 ? 3 : curAttempt === 2 ? 2 : curAttempt === 3 ? 1 : 0;
            scores[currentIndex] = points;
            totalScore += points;
            completed[currentIndex] = true;
            
            const factDiv = document.getElementById('factMsg');
            const factText = currentFacts && currentFacts[currentIndex] ? currentFacts[currentIndex] : 'Интересный факт об этом месте.';
            factDiv.innerHTML = `<strong>📜 Историческая справка:</strong><br>${factText}<br>+${points} баллов`;
            factDiv.style.display = 'block';
            
            const checkBtn = document.getElementById('checkBtn');
            const answerInput = document.getElementById('answerInput');
            if (checkBtn) checkBtn.disabled = true;
            if (answerInput) answerInput.disabled = true;
            
            const nextTaskDiv = document.getElementById('nextTaskMsg');
            if (nextTaskDiv && step.nextTask) {
                nextTaskDiv.innerHTML = `✅ Далее: ${step.nextTask}`;
                nextTaskDiv.style.display = 'block';
            }
            const nextBtn = document.getElementById('nextBtn');
            if (nextBtn) nextBtn.style.display = 'block';
            updateUI();
        } else {
            if (curAttempt >= 3) {
                hintShown[currentIndex] = true;
                const hintDiv = document.getElementById('hintMsg');
                hintDiv.innerHTML = `💡 Подсказка: ${step.correct[0]}. Вы получаете 0 баллов.`;
                hintDiv.style.display = 'block';
                
                scores[currentIndex] = 0;
                completed[currentIndex] = true;
                
                const factDiv = document.getElementById('factMsg');
                const factText = currentFacts && currentFacts[currentIndex] ? currentFacts[currentIndex] : 'Историческая справка.';
                factDiv.innerHTML = `<strong>📜 Историческая справка:</strong><br>${factText}<br>⚠️ Использована подсказка — 0 баллов`;
                factDiv.style.display = 'block';
                
                const checkBtn = document.getElementById('checkBtn');
                const answerInput = document.getElementById('answerInput');
                if (checkBtn) checkBtn.disabled = true;
                if (answerInput) answerInput.disabled = true;
                
                const nextTaskDiv = document.getElementById('nextTaskMsg');
                if (nextTaskDiv && step.nextTask) {
                    nextTaskDiv.innerHTML = `✅ Далее: ${step.nextTask}`;
                    nextTaskDiv.style.display = 'block';
                }
                const nextBtn = document.getElementById('nextBtn');
                if (nextBtn) nextBtn.style.display = 'block';
                updateUI();
            } else {
                showMessage(`❌ Неверно. Осталось попыток: ${3 - curAttempt}`, true);
                input.value = '';
                input.focus();
            }
        }
    }

    // ==================== ЗАГРУЗКА ДАННЫХ ГОРОДА ====================
    async function loadCitiesList() {
        try {
            const response = await fetch('cities.json');
            const data = await response.json();
            citiesList = data.cities;
            renderCitySelector();
        } catch(e) {
            console.error('Ошибка загрузки списка городов:', e);
            citiesList = [];
        }
    }

    function renderCitySelector() {
        if (!cityGrid) return;
        cityGrid.innerHTML = '';
        for (const city of citiesList) {
            const card = document.createElement('div');
            card.className = `city-card ${!city.active ? 'disabled' : ''} ${currentCity === city.id ? 'active' : ''}`;
            if (city.active) {
                card.onclick = () => switchCity(city.id);
            }
            card.innerHTML = `
                <div class="city-icon">🏙️</div>
                <div class="city-name">${city.name.ru}</div>
                <div class="city-desc">${city.shortDescription.ru}</div>
                <div class="city-desc">${city.routeDistance} км • ${city.totalPoints} точек</div>
                ${!city.active ? '<div class="badge">Скоро</div>' : ''}
            `;
            cityGrid.appendChild(card);
        }
    }

    async function switchCity(cityId) {
        if (isLoading) return;
        const cityInfo = citiesList.find(c => c.id === cityId);
        if (!cityInfo || !cityInfo.active) return;
        
        isLoading = true;
        stepsContainer.innerHTML = '<div class="loading"><div class="spinner"></div><br>Загрузка города...</div>';
        
        try {
            const response = await fetch(`data/${cityId}.json`);
            const cityData = await response.json();
            currentCityData = cityData;
            currentCity = cityId;
            currentSteps = cityData.steps[currentLang] || cityData.steps.ru;
            currentFacts = cityData.facts[currentLang] || cityData.facts.ru;
            
            // Загружаем сохранённый прогресс или создаём новый
            if (!loadCityProgress(cityId)) {
                resetStateForCity(currentCityData);
            } else {
                // проверяем длину массивов
                if (scores.length !== currentSteps.length) {
                    resetStateForCity(currentCityData);
                }
            }
            
            renderCitySelector();
            renderCurrentQuestion();
            updateUI();
            
            // Показать приветствие для города
            showCityIntro(cityInfo);
        } catch(e) {
            console.error('Ошибка загрузки города:', e);
            stepsContainer.innerHTML = '<div class="loading">❌ Ошибка загрузки. Попробуйте позже.</div>';
        }
        isLoading = false;
    }

    function showCityIntro(cityInfo) {
        const t = {
            ru: { title: `🏰 Добро пожаловать в квест по ${cityInfo.name.ru}!` }
        };
        const introCard = document.getElementById('introCard');
        introCard.innerHTML = `
            <h2>${t.ru.title}</h2>
            <p>${cityInfo.shortDescription.ru}</p>
            <hr>
            <p>📍 Протяжённость маршрута: ${cityInfo.routeDistance} км</p>
            <p>⏱️ Время прохождения: ${cityInfo.estimatedTime} часа</p>
            <div class="calories-badge">🔥 ≈ ${cityInfo.calories} ккал (примерно как ${Math.round(cityInfo.calories/300)} бургеров!)</div>
            <p>⭐ Правила: 3 балла с 1 попытки, 2 со 2-й, 1 с 3-й.<br>🎯 Максимум: ${cityInfo.maxScore} баллов.</p>
            <button id="closeIntro" class="close-intro">Начать квест →</button>
        `;
        document.getElementById('introOverlay').style.display = 'flex';
        document.getElementById('closeIntro').onclick = () => {
            document.getElementById('introOverlay').style.display = 'none';
        };
    }

    // ==================== ЯЗЫКИ И ЧАТ ====================
    function setLanguage(lang) {
        currentLang = lang;
        document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelector(`.lang-btn[data-lang="${lang}"]`).classList.add('active');
        
        if (currentCityData) {
            currentSteps = currentCityData.steps[lang] || currentCityData.steps.ru;
            currentFacts = currentCityData.facts[lang] || currentCityData.facts.ru;
            renderCurrentQuestion();
        }
        updateUI();
        saveState();
    }

    function initChat() {
        const aiButton = document.getElementById('aiButton');
        const chatModal = document.getElementById('chatModal');
        const chatClose = document.getElementById('chatClose');
        const chatSend = document.getElementById('chatSend');
        const chatInput = document.getElementById('chatInput');
        const chatMessages = document.getElementById('chatMessages');
        
        aiButton.onclick = () => { chatModal.style.display = 'flex'; };
        chatClose.onclick = () => { chatModal.style.display = 'none'; };
        
        function addMessage(text, isUser) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
            msgDiv.innerText = text;
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        function getBotAnswer(question) {
            const q = question.toLowerCase();
            if (q.includes('балл') || q.includes('очк') || q.includes('правил')) {
                return 'Баллы начисляются: 3 (1 попытка), 2 (2), 1 (3). После 3 ошибок — подсказка и 0 баллов.';
            }
            if (q.includes('где') || q.includes('искать') || q.includes('найти')) {
                return 'Каждая точка — реальный объект в городе. Читайте загадку и ищите подсказки на табличках, памятниках или информационных стендах.';
            }
            if (q.includes('маршрут') || q.includes('протяж')) {
                return currentCityData ? `Маршрут长约 ${currentCityData.routeDistance} км, время ~${currentCityData.estimatedTime} часа.` : 'Маршрут загружается.';
            }
            return 'Я AI-помощник квеста. Внимательно читайте загадки, ищите таблички и памятники. Удачи!';
        }
        
        chatSend.onclick = () => {
            const text = chatInput.value.trim();
            if (!text) return;
            addMessage(text, true);
            const reply = getBotAnswer(text);
            setTimeout(() => addMessage(reply, false), 300);
            chatInput.value = '';
        };
        chatInput.onkeypress = (e) => { if (e.key === 'Enter') chatSend.click(); };
    }

    // ==================== ИНИЦИАЛИЗАЦИЯ ====================
    document.addEventListener('DOMContentLoaded', async () => {
        stepsContainer = document.getElementById('stepsContainer');
        totalSpan = document.getElementById('totalScore');
        completedSpan = document.getElementById('completedCount');
        totalPointsSpan = document.getElementById('totalPoints');
        progressBar = document.getElementById('progressBar');
        congratsDiv = document.getElementById('congrats');
        cityGrid = document.getElementById('cityGrid');
        
        initChat();
        await loadCitiesList();
        
        const hadSaved = loadSavedState();
        if (hadSaved && currentCity) {
            // Загружаем данные выбранного города
            try {
                const response = await fetch(`data/${currentCity}.json`);
                const cityData = await response.json();
                currentCityData = cityData;
                currentSteps = cityData.steps[currentLang] || cityData.steps.ru;
                currentFacts = cityData.facts[currentLang] || cityData.facts.ru;
                loadCityProgress(currentCity);
                renderCurrentQuestion();
                updateUI();
            } catch(e) {
                console.error('Ошибка загрузки сохранённого города:', e);
            }
        }
        
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => setLanguage(btn.dataset.lang));
            if (btn.dataset.lang === currentLang) btn.classList.add('active');
        });
        
        // Если нет сохранённого города, показываем селектор
        if (!currentCity) {
            stepsContainer.innerHTML = '<div class="loading">🏙️ Выберите город из списка выше</div>';
        }
    });
    
    // Service Worker для PWA
    if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/tobolsk-quest/sw.js', { scope: '/tobolsk-quest/' }).catch(e => console.log('SW error:', e));
}
</script>
